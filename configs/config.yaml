# ROG-Agent MVP configuration
# ---------------------------------------------------------------
# One 7B model handles every role via system-prompt switching.
# This is the sweet spot for 6-8 GB VRAM laptops (ROG Flow X13).

llm:
  # Primary model. Pull with: `ollama pull qwen2.5:7b-instruct-q4_K_M`
  # ~4.7 GB on disk, ~5.5 GB VRAM at 8k context.
  model: "qwen2.5:7b-instruct-q4_K_M"

  # Multi-model support: list of available models with priorities
  models:
    - name: "qwen2.5:7b-instruct-q4_K_M"
      priority: 1  # Highest priority (primary)
      min_vram_gb: 6
    - name: "qwen2.5:3b-instruct-q5_K_M"
      priority: 2  # Fallback for simple tasks or low VRAM
      min_vram_gb: 4

  # Selection strategy: complexity_based, resource_based, or user_specified
  selection_strategy: "complexity_based"

  # Fallback for 4 GB VRAM machines (uncomment + change above):
  # model: "qwen2.5:3b-instruct-q5_K_M"        # ~2.3 GB, weaker math

  # Alternate if you prefer reasoning-distilled outputs (slower, verbose):
  # model: "deepseek-r1:7b"                     # ~4.7 GB, adds <think> tokens

  host: "http://localhost:11434"
  num_ctx: 8192            # context window; raise to 16384 on 32 GB RAM
  temperature: 0.2         # low for planning / critic / code
  temperature_creative: 0.6  # writer role
  timeout_s: 180
  fallback_timeout_s: 60   # Timeout per model in fallback chain

rag:
  db_path: "./kb/chroma"
  embedding_model: "BAAI/bge-small-en-v1.5"   # 130 MB, CPU-fast
  chunk_tokens: 256
  chunk_overlap: 32
  alpha_dense: 0.6          # hybrid weight: dense vs BM25
  top_k: 6
  top_m: 30                 # candidates before rerank fusion
  token_budget: 3500        # packed context budget for the LLM
  # Metadata filtering (optional): pass to retrieve() as dict:
  # metadata_filters: {
  #   "kind": "doc" | "bib",           # document type
  #   "year_min": "2020",              # oldest year (inclusive)
  #   "year_max": "2024",              # newest year (inclusive)
  #   "source": "filename.pdf"         # specific source file
  # }
  # Example: retrieve(query, metadata_filters={"year_min": "2020"})

agent:
  max_iterations: 2         # critic revision loop cap
  sandbox_timeout_s: 60
  sandbox_mem_mb: 2048

trading:
  # All execution is PAPER by default. Live trading requires
  # ALLOW_LIVE=1 in the environment AND a manual confirm prompt.
  broker: "paper"
  initial_equity: 100000.0
  max_leverage: 1.0
  max_position_pct: 0.20
  max_turnover_per_rebalance: 0.50
  var_confidence: 0.99
  var_limit_pct: 0.05       # max 1-day 99% VaR as fraction of equity
  kelly_fraction: 0.33      # fractional Kelly (haircut on f*)

writing:
  latex_engine: "tectonic"  # or "pdflatex"; tectonic is a single binary
  citation_sim_threshold: 0.55  # min cosine sim to support a cited claim
